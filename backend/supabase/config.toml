# Supabase project config — used by the Supabase CLI for deploys.
# Project ref matches frontend/.env VITE_SUPABASE_PROJECT_ID (xwvdktfhfadlwoqjkqcb).
project_id = "xwvdktfhfadlwoqjkqcb"

[functions.invite-user]
# Privileged invite flow. Uses the service-role key, so it must run server-side.
# verify_jwt = true: the function authorizes the caller itself (must be an active
# super_admin), so an authenticated JWT is required.
verify_jwt = true

[functions.milestone-alerts]
# Scheduled job; invoked by cron with the service role.
verify_jwt = true

[functions.accept-invitation]
# PUBLIC: the invitee has no session yet. Authenticated by the invitation token
# in the request body (hashed + checked against the invitations table), not a JWT.
verify_jwt = false

[functions.request-password-reset]
# PUBLIC: the user is signed out. Accepts an email and always responds 200 to
# avoid account enumeration; no JWT to verify.
verify_jwt = false

[functions.reset-password]
# PUBLIC: the user is signed out. Authenticated by the single-use reset token in
# the request body, not a JWT.
verify_jwt = false
